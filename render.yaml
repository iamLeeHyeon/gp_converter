# Render Blueprint — https://render.com/docs/blueprint-spec
# 사용법: render.com에서 New > Blueprint > 이 저장소 연결하면 자동으로 읽힘.
#
# 프리 플랜엔 영구 디스크가 없다. app/jobs.py의 JobStore가 파일 기반이라
# web/worker를 별도 서비스로 나누면 디스크를 공유 못 해서 job이 영원히
# "queued"로 멈춘다(README에 이미 문서화된 함정). 그래서 web 컨테이너 하나
# 안에서 celery 워커와 uvicorn을 같이 띄운다.
#
# ponytail: 프리 플랜은 15분 유휴 후 재시작되면서 컨테이너 파일시스템이
# 초기화된다 — 업로드된 파일/변환 결과/회원 DB가 전부 날아간다. "임시
# 테스트용" 배포로만 쓸 것. 데이터를 유지하려면 유료 플랜 + 영구 디스크 필요.
services:
  - name: gp-converter-redis
    type: keyvalue
    plan: free
    ipAllowList: []

  - name: gp-converter-demo
    type: web
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    dockerCommand: >
      sh -c "celery -A app.tasks:celery_app worker --loglevel=info --concurrency=2 &
      exec python3 -m uvicorn app.main:app --host 0.0.0.0 --port 8000"
    envVars:
      - key: CELERY_BROKER_URL
        fromService:
          name: gp-converter-redis
          type: keyvalue
          property: connectionString
      - key: FRONTEND_URL
        sync: false
      - key: BACKEND_URL
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_ID_PRO
        sync: false
